<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>

    <style>
        ul {
            list-style-type: square;
        }

        ol {
            list-style-type:upper-alpha;
        }
    </style>
</head>
<body>
    <h3>Drinks Items</h3> 
    <ul>
        <li>Juice</li>
        <li>Soft Drinks</li>
        <li>Water</li>
        <li>Coffee</li>
    </ul>

    <h3>Processed Food</h3>
    <ol start="6">
        <li>Cake</li>
        <li>Jam</li>
        <li>Squash</li>
    </ol>
</body>
</html>
