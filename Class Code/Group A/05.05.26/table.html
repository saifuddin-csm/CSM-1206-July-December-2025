<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>

    <style>
        table, th, td { 
            border-collapse: collapse;
            padding: 10px;
        }

        td {
            border-bottom: 1px solid black;
            border-collapse: collapse;
        }

        tr:nth-child(2n+3) {
            background-color: yellowgreen;
        }

        tr:nth-child(2n+4) {
            background-color:beige;
        }

        th {
            background-color: darkslategray;
            color: white;
        }

        tr:hover {
            background-color:green;
        }
    </style>
</head>
<body>
    <table>
        <tr> <th colspan="2">Name</th> <th rowspan="2">ID</th> </tr>
        <tr> <th>First</th> <th>Last</th> </tr>
        <tr> <td>Rahim</td> <td>Uddin</td> <td>250710</td> </tr>
        <tr> <td>Karim</td> <td>Uddin</td> <td>250711</td> </tr>
        <tr> <td>Imran</td> <td>Sarkar</td> <td>250718</td> </tr>
        <tr> <td>Uttam</td> <td>Paul</td> <td>250703</td> </tr>
    </table>
    
</body>
</html>
