<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>

    <style>
        label,
        input {
            display: block;

        }

        input {
            margin-bottom: 15px;
            width: 96%;
            padding: 5px;
        }

        .gender {
            display: inline;
            width: auto;
        }
    </style>
</head>

<body>

    <form action="https://formspree.io/f/xkoyyqbg" method="POST">
        <fieldset>
            <legend>Student Sign Up</legend>

            <!-- Add this inside your <fieldset> -->
            <input type="text" name="_gotcha" style="display:none" />

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Eaqub Hosen Imran" required>

            <label for="uname">User Name</label>
            <input type="text" id="uname" name="uname" placeholder="e.g. emran120" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="e.g. emran@bau.edu.bd" required>

            <label for="dob">Date of birth</label>
            <input type="date" id="dob" name="dob" min="2008-01-01">

            <label for="phone">Phone No</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. +8801XYYYYYYYY" pattern="\+8801[3-9][0-9]{8}">

            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="e.g. 21" min="18" max="40">

            <label>Gender</label>

            <input type="radio" id="male" name="gender" value="male" class="gender">
            <label for="male" class="gender">Male</label>

            <input type="radio" id="female" name="gender" value="female" class="gender">
            <label for="female" class="gender">Female</label>


            <label>Hobby</label>

            <input type="checkbox" id="reading" name="reading" value="read" class="gender">
            <label for="reading" class="gender">Reading</label>

            <input type="checkbox" id="cycling" name="cycling" value="cycle" class="gender">
            <label for="cycling" class="gender">Cycling</label>

            <label for="weight">Weight: <span id="weightVal">75</span> kg</label>
            <input type="range" name="weight" id="weight" min="30" max="120" value="75" 
                oninput="document.getElementById('weightVal').innerText = this.value">

            <!-- <label for="pass">Password</label>
            <input type="password" id="pass" name="pass" placeholder="Enter a password"> -->

            <label for="image">Upload Your Image</label>
            <input type="file" id="image" name="image">
            

            <input type="submit" value="Sign Up">

            <input type="reset" value="Clear">

            <input type="button" value="Show Message" onclick="alert('You clicked the button')">

        </fieldset>
    </form>

</body>

</html>
